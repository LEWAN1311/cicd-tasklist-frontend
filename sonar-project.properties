# Identification du projet (à adapter à votre instance SonarQube)
sonar.projectKey=Lewan_CICD_TaskList_Frontend
sonar.projectName=frontend
sonar.projectVersion=1.0.0

# Sources analysées
sonar.sources=src
sonar.tests=src/__tests__
sonar.sourceEncoding=UTF-8

# Distinction code source / fichiers de test
sonar.test.inclusions=src/__tests__/**/*

# Rapport de couverture généré par Vitest (provider v8, reporter lcov)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions de la mesure de couverture :
# fichiers non testables unitairement ou sans logique à couvrir
sonar.coverage.exclusions=\
  src/main.tsx,\
  src/**/*.d.ts,\
  src/types/**,\
  **/*.css,\
  src/__tests__/**

# Exclusions de l'analyse (jamais scannés)
sonar.exclusions=\
  node_modules/**,\
  dist/**,\
  coverage/**,\
  reports/**